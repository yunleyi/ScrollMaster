name: Build & Release ScrollMaster

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Upgrade pip and install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyautogui pynput pystray pillow pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          python -m PyInstaller -F -w --name ScrollMasterUltimate ScrollMasterUltimate.py

      - name: Generate version tag
        id: tag
        run: echo "tag=v1.0.0-$(date +%Y%m%d%H%M)" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ScrollMaster 自动构建版 ${{ steps.tag.outputs.tag }}
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/ScrollMasterUltimate.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
