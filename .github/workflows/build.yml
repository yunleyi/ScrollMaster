name: Build ScrollMaster EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller -F -w --name ScrollMasterUltimate ScrollMasterUltimate.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScrollMasterUltimate-EXE
          path: dist/ScrollMasterUltimate.exe
